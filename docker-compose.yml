  ai_verification:
    build: ./python-ai/services/ai_verification
    container_name: ai_verification
    ports:
      - "8017:8017"
    environment:
      - MODEL_CACHE=/app/models
    volumes:
      - model_cache:/app/models
    depends_on: []
    networks:
      - ai_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
          
  embedded_ai:
    build: ./python-ai/services/embedded_ai
    container_name: embedded_ai
    ports:
      - "8104:8104"  # پورت تغییر کرد
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-app}
    depends_on:
      - redis
      - mysql
    networks:
      - ai_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  ml_service:
    build: ./python-ai/services/ml_service
    container_name: ml_service
    ports:
      - "8007:8000"  # پورت تغییر کرد
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=/app/models
      - EMBEDDING_SERVICE_URL=http://embedded_ai:8100
    volumes:
      - model_cache:/app/models
    depends_on:
      - redis
      - embedded_ai
    networks:
      - ai_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  phpmyadmin:
    image: phpmyadmin:5
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"   # ← پورت 8081 رو روی localhost مپ می‌کنه (می‌تونی تغییر بدی)
    environment:
      PMA_HOST: mysql               # نام سرویس mysql در docker-compose
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root123  # همون رمز root که در mysql تنظیم کردی
      PMA_ABSOLUTE_URI: http://localhost:8082
    depends_on:
      - mysql
    networks:
      - ai_network    
    volumes:
      - ~/Downloads/darkwolf-5.2:/var/www/html/themes/darkwolf-5.2     

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
